<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="top-bar-login"></div>

    <div class="main-body-login">
        <div class="image-login"></div>

        <!--LOGIN FORM-->
        <div class="login-form">
            <h3 class="zenith-login">ZENITH LOGIN</h3>
            <form method="POST">
                <input class="login-input" type="text" name="Username" placeholder="Enter your Username"><br>
                <input class="login-input" type="text" name="Password" placeholder="Enter your Password"><br>
            </form>
            <div class="show-password-row">
                <div class="show-password-sec">
                    <input type="checkbox" id="showPassword">
                    <label for="showPassword">Show Password</label>
                </div>
                <div class="forgot-password-link">
                    <label>Forgot Password?</label>
                </div>
            </div>

            <button class="sign-in-btn">Sign In</button>
        </div>

    </div>
</body>
</html>
